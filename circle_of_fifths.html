<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Circle of Fifths – External JS</title>
    <style>
      body {
        background: #2c2c2c;
        display: flex;
        justify-content: center;
        padding: 20px;
        font-family: sans-serif;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
      svg {
        display: block;
        margin: 0 auto;
        border: 1px solid #ccc;
      }
      .toolbar {
        margin-top: 20px;
        text-align: center;
      }
      button {
        background: #8b0000;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin: 0 4px;
      }
      button:hover {
        background: #a00000;
      }
      textarea {
        width: 100%;
        height: 200px;
        margin-top: 20px;
        font-family: monospace;
        font-size: 12px;
        display: none;
      }
      .note {
        font-size: 12px;
        color: #555;
        text-align: center;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="circle-container"></div>
      <div class="toolbar">
        <button id="toggleCode">📄 Show / Hide SVG Code</button>
        <button onclick="saveSVG()">💾 Save SVG</button>
        <button id="printBtn" onclick="printCircle()">🖨️ Print</button>
      </div>
      <textarea id="svgCodeArea" readonly></textarea>
      <div class="note">
        💡 Click “Show / Hide SVG Code” to view or copy the raw SVG.<br />
        Use “Save SVG” to download the file, or “Print” to export as PDF.
      </div>
    </div>

    <script src="./circle_of_fifths.js" defer></script>
    <script defer>
      function updateSvgCode() {
        const container = document.getElementById("circle-container");
        if (!container) return;
        const svgElement = container.querySelector("svg");
        const textarea = document.getElementById("svgCodeArea");
        if (svgElement && textarea) {
          textarea.value = svgElement.outerHTML;
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        if (typeof window.renderCircleOfFifths === "function") {
          window.renderCircleOfFifths("circle-container");
          updateSvgCode();
        } else {
          console.error("renderCircleOfFifths not found");
        }

        document.getElementById("toggleCode").addEventListener("click", () => {
          const area = document.getElementById("svgCodeArea");
          if (!area) return;
          if (area.style.display === "none" || area.style.display === "") {
            area.style.display = "block";
          } else {
            area.style.display = "none";
          }
        });
      });

      function printCircle() {
        const svgElement = document.querySelector("#circle-container svg");
        if (!svgElement) return;
        const clone = svgElement.cloneNode(true);
        const win = window.open("", "_blank");
        win.document.write(`
      <!DOCTYPE html><html><head><title>Circle of Fifths</title>
      </head><body>${clone.outerHTML}</body></html>
    `);
        win.document.close();
        win.onafterprint = () => win.close();
        win.print();
        setTimeout(() => win.close(), 10000);
      }

      function saveSVG() {
        const svgElement = document.querySelector("#circle-container svg");
        if (!svgElement) {
          console.error("SVG element not found");
          return;
        }

        const clone = svgElement.cloneNode(true);
        clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");

        const originalWidth = svgElement.getAttribute("width");
        const originalHeight = svgElement.getAttribute("height");
        if (originalWidth) clone.setAttribute("width", originalWidth);
        if (originalHeight) clone.setAttribute("height", originalHeight);

        const serializer = new XMLSerializer();
        let svgString = serializer.serializeToString(clone);
        svgString = '<?xml version="1.0" encoding="UTF-8"?>\n' + svgString;

        const blob = new Blob([svgString], { type: "image/svg+xml" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.download = "circle_of_fifths.svg";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }
    </script>
  </body>
</html>

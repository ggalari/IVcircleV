<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Circle of Fifths – External JS</title>
    <style>
      body {
        background: #2c2c2c;
        display: flex;
        justify-content: center;
        padding: 20px;
        font-family: sans-serif;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
      svg {
        display: block;
        margin: 0 auto;
        border: 1px solid #ccc;
      }
      .toolbar {
        margin-top: 20px;
        text-align: center;
      }
      button {
        background: #8b0000;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin: 0 4px;
      }
      button:hover {
        background: #a00000;
      }
      .neighbor-overlay {
        pointer-events: none;
      }
      .highlight-neighbor {
        fill: rgba(139, 0, 0, 0.14);
        transition: opacity 180ms ease-in-out;
      }
      .highlight-major {
        fill: rgba(139, 0, 0, 0.25);
      }
      .highlight-minor {
        fill: rgba(46, 107, 46, 0.22);
      }
      .fade-in {
        animation: fadeIn 220ms ease forwards;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
      }

      .legend { display: flex; gap: 12px; justify-content: center; margin-top: 12px; font-size: 13px; color: #444; }
      .legend .swatch { width: 18px; height: 12px; display: inline-block; border-radius: 3px; margin-right: 6px; vertical-align: middle; }
      .legend .major-swatch { background: rgba(139,0,0,0.14); border: 1px solid rgba(139,0,0,0.3); }
      .legend .minor-swatch { background: rgba(46,107,46,0.12); border: 1px solid rgba(46,107,46,0.25); }
      .ctx-menu {
        position: fixed;
        z-index: 1000;
        background: white;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
        padding: 4px 0;
        min-width: 160px;
      }
      .ctx-menu[hidden] {
        display: none;
      }
      .ctx-menu-item {
        display: block;
        width: 100%;
        text-align: left;
        border: none;
        background: none;
        padding: 8px 16px;
        cursor: pointer;
        font-size: 14px;
        font-family: sans-serif;
        color: inherit;
      }
      .ctx-menu-item:hover:not(:disabled) {
        background: #f0f0f0;
      }
      .ctx-menu-item:disabled {
        color: #aaa;
        cursor: not-allowed;
      }
      textarea {
        width: 100%;
        height: 200px;
        margin-top: 20px;
        font-family: monospace;
        font-size: 12px;
      }
      textarea[hidden] {
        display: none;
      }
      .note {
        font-size: 12px;
        color: #555;
        text-align: center;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="circle-container"></div>
      <div class="toolbar">
        <button id="toggleCode">📄 Show / Hide SVG Code</button>
          <button onclick="saveSVG()">💾 Save SVG</button>
        <button id="printBtn" onclick="printCircle()">🖨️ Print</button>
      </div>
      <textarea id="svgCodeArea" readonly hidden></textarea>
      <div class="note">
        💡 Click “Show / Hide SVG Code” to view or copy the raw SVG.<br />
        Use “Save SVG” to download the file, or “Print” to print or export as PDF.<br />
        Right-click any key label to show that key’s neighbor slice.
      </div>
      <div class="legend" aria-hidden="true">
        <div><span class="swatch major-swatch"></span>Major neighbors</div>
        <div><span class="swatch minor-swatch"></span>Minor neighbors</div>
      </div>
      <div id="ctx-menu" class="ctx-menu" hidden>
        <button data-action="show" class="ctx-menu-item">Show neighbors</button>
        <button data-action="clear" class="ctx-menu-item">Clear neighbors</button>
      </div>
    </div>

    <script type="text/javascript" src="circle_of_fifths.js" defer></script>
    <script type="text/javascript" src="circle_of_fifths.page.js" defer></script>
  </body>
</html>

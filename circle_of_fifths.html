<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Circle of Fifths – External JS</title>
    <style>
      body {
        background: #2c2c2c;
        display: flex;
        justify-content: center;
        padding: 20px;
        font-family: sans-serif;
      }
      .card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }
      svg {
        display: block;
        margin: 0 auto;
        border: 1px solid #ccc;
      }
      .toolbar {
        margin-top: 20px;
        text-align: center;
      }
      button {
        background: #8b0000;
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        margin: 0 4px;
      }
      button:hover {
        background: #a00000;
      }
      textarea {
        width: 100%;
        height: 200px;
        margin-top: 20px;
        font-family: monospace;
        font-size: 12px;
      }
      textarea[hidden] {
        display: none;
      }
      .note {
        font-size: 12px;
        color: #555;
        text-align: center;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="circle-container"></div>
      <div class="toolbar">
        <button id="toggleCode">📄 Show / Hide SVG Code</button>
        <button onclick="saveSVG()">💾 Save SVG</button>
        <button id="printBtn" onclick="printCircle()">🖨️ Print</button>
      </div>
      <textarea id="svgCodeArea" readonly hidden></textarea>
      <div class="note">
        💡 Click “Show / Hide SVG Code” to view or copy the raw SVG.<br />
        Use “Save SVG” to download the file, or “Print” to export as PDF.
      </div>
    </div>

    <script type="text/javascript" src="circle_of_fifths.js" defer></script>
    <script type="text/javascript" src="circle_of_fifths.page.js" defer></script>
  </body>
</html>

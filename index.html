<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circle of Fifths</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="card">
      <div id="circle-container"></div>
      <div class="hamburger-wrapper">
        <button class="hamburger-btn" aria-label="Menu" aria-expanded="false">☰</button>
        <div class="hamburger-dropdown" hidden>
          <button id="btn-save" class="dropdown-item">💾 Télécharger SVG</button>
          <button id="btn-print" class="dropdown-item">🖨️ Imprimer</button>
        </div>
      </div>
      <div class="legend" aria-hidden="true">
        <div><span class="swatch major-swatch"></span>Majeur</div>
        <div><span class="swatch minor-swatch"></span>Mineur</div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>

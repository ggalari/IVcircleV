<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2d2b2a" id="meta-theme-color" />
    <title>Cercle des quintes</title>
    <script>
      // Apply theme immediately to prevent flash
      (function() {
        var m = document.cookie.match(/(?:^|;\s*)theme=([^;]*)/);
        var theme = m ? m[1] : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
        var tc = document.getElementById('meta-theme-color');
        if (tc) tc.setAttribute('content', theme === 'dark' ? '#1a1816' : '#2d2b2a');
      })();
    </script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="card">
      <div id="circle-container"></div>
      <div class="hamburger-wrapper">
        <button class="hamburger-btn" aria-label="Menu" aria-expanded="false" aria-haspopup="menu">
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true">
            <path d="M1 1h16M1 7h16M1 13h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="hamburger-dropdown" role="menu" hidden>
          <button id="btn-save" class="dropdown-item" role="menuitem">
            <svg class="dropdown-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Télécharger SVG
          </button>
          <button id="btn-print" class="dropdown-item" role="menuitem">
            <svg class="dropdown-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Imprimer
          </button>
          <button id="btn-toggle-label" class="dropdown-item" role="menuitem">
            <svg class="dropdown-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            Tonalité au centre
          </button>
          <button id="btn-toggle-theme" class="dropdown-item" role="menuitem">
            <svg class="dropdown-icon dropdown-icon--theme-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="dropdown-icon dropdown-icon--theme-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span class="dropdown-item__label">Mode sombre</span>
          </button>
        </div>
      </div>
      <div class="legend">
        <div><span class="swatch major-swatch"></span>Majeur</div>
        <div><span class="swatch minor-swatch"></span>Mineur</div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
